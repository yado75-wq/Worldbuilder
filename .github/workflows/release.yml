name: Release Obsidian plugin

on:
    push:
        tags:
            - '*'

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v6

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Build plugin
              run: |
                  npm ci
                  npm run build

            - name: Package plugin
              run: |
                  rm -rf release worldbuilder.zip
                  mkdir -p release
                  cp main.js manifest.json release/
                  if [ -f styles.css ]; then cp styles.css release/; fi
                  cp -R defaults release/
                  python - <<'PY'
                  import os
                  import zipfile
                  from pathlib import Path

                  root = Path('release').resolve()
                  archive = Path('worldbuilder.zip').resolve()
                  with zipfile.ZipFile(archive, 'w', compression=zipfile.ZIP_DEFLATED) as zf:
                      for path in sorted(root.rglob('*')):
                          if path.is_file():
                              zf.write(path, path.relative_to(root))
                  PY

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"

                  gh release create "$tag" \
                    --title="$tag" \
                    --draft \
                    worldbuilder.zip
